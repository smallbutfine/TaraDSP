; ---------------------------------------------------------
; IRConvolverPro - Global Configuration Settings
; All values here are DEFAULTS and can be overridden via CLI.
; ---------------------------------------------------------

[Metadata]
; Set your professional branding for the WAV 'LIST INFO' chunks
Artist=Your Name or Studio
Comment=High-Fidelity Impulse Response processed by IRConvolverPro
Title=Custom IR Series

[Audio]
; Output format defaults
TargetBits=24
SampleRate=48000
; Gain in decibels (e.g. -1.0 for some headroom)
DefaultGain=-0.1
; Dither Amount: 1.0 = Standard TPDF, >1.0 = Louder hiss, <1.0 = Less noise
DitherAmount=1.0

[DSP]
; Pre-processing defaults
MinPhase=false
PhaseInvert=false
; SRC Filter: gentle (less ringing) or brickwall (steep)
SRCFilter=gentle

[Batch]
; Default output prefix for batch processing
OutputPrefix=conv_
; Force mono mixdown during batch
ForceMono=false

[System]
; Show waveform preview by default (true/false)
VerboseMode=true
