name: Multi-Platform Build IRConvolverPro

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Wir bauen für alle drei großen Betriebssysteme
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: 'stable'

    - name: Install Build Essentials (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtk2.0-dev libsoxr-dev libx11-dev
        
        # Erzeugt einen sicheren Symlink für den Pascal-Linker, falls Ubuntu den Pfad versteckt
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libsoxr.so.0 /usr/lib/libsoxr.so

    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libsoxr
        
        # Verlinkt die macOS Homebrew-Bibliothek in das System-Suchverzeichnis
        sudo ln -sf $(brew --prefix libsoxr)/lib/libsoxr.dylib /usr/local/lib/libsoxr.dylib

    - name: Set up MinGW
      if: runner.os == 'Windows'
      uses: egor-tensin/setup-mingw@v3
      with:
        platform: x64
      
    - name: Compile Static C-Backend (PFFFT)
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          gcc -O3 -c pffft.c -o pffft.obj -msse -mfpmath=sse
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          # Erzwingt x86_64 Architektur für den Intel-Pascal-Compiler auf macOS
          gcc -O3 -arch x86_64 -c pffft.c -o pffft.o
        else
          gcc -O3 -fPIC -c pffft.c -o pffft.o
        fi
      shell: bash

    - name: Build CLI & GUI Editions
      if: ${{ matrix.os == 'windows-latest' }}
      run: ./build.bat
      
    - name: Build Application (Linux & macOS)
      if: matrix.os != 'windows-latest'
      run: |
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          # Nutzt die korrekte Syntax, um Linker-Optionen über lazbuild an fpc weiterzureichen
          lazbuild --build-mode=Release --user-options="-Fl/usr/local/lib -Fl$(brew --prefix)/lib" IRConvolverPro.lpi
        else
          lazbuild --build-mode=Release IRConvolverPro.lpi
        fi
      shell: bash
          
    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        echo "=== Inhalt des Arbeitsverzeichnisses vor dem Kopieren ==="
        ls -la
        
        # Kopiere die kompilierten Binaries (fängt alle denkbaren Namensmuster ab)
        cp IRConvolverPro.exe dist/ 2>/dev/null || true
        cp IRConvolverPro dist/ 2>/dev/null || true
        cp IRConvolverPro-CLI* dist/ 2>/dev/null || true
        cp IRConvolverPro-GUI* dist/ 2>/dev/null || true
        
        # Einstellungen und Lizenz sichern
        [ -f settings.ini ] && cp settings.ini dist/ || true
        [ -f LICENSE ] && cp LICENSE dist/ || true
        
        echo "=== Inhalt des dist/ Ordners ==="
        ls -la dist/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: IRConvolverPro-${{ runner.os }}
        path: dist/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package and Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          name: IRConvolverPro Release ${{ github.ref_name }}
          body: "Multi-platform binaries for Windows, Linux, and macOS."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
