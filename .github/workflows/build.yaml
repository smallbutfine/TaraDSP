name: Multi-Platform Build TaraDSP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Wir bauen für alle drei großen Betriebssysteme
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: 'stable'

    - name: Install Build Essentials (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtk2.0-dev libsoxr-dev libx11-dev
        
        # Erzeugt einen sicheren Symlink für den Pascal-Linker, falls Ubuntu den Pfad versteckt
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libsoxr.so.0 /usr/lib/libsoxr.so

    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libsoxr
        
        # Verlinkt die macOS Homebrew-Bibliothek in das System-Suchverzeichnis
        sudo ln -sf $(brew --prefix libsoxr)/lib/libsoxr.dylib /usr/local/lib/libsoxr.dylib

    - name: Set up MinGW
      if: runner.os == 'Windows'
      uses: egor-tensin/setup-mingw@v3
      with:
        platform: x64
      
    - name: Compile Static C-Backend (PFFFT)
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # 1. AVX2 Version für Windows
          gcc -O3 -c pffft.c -o pffft.obj -mavx2 -mfpmath=sse
          # 2. No-AVX2 Version für Windows (nutzt nur SSE)
          gcc -O3 -c pffft.c -o pffft_noAVX2.obj -msse -mfpmath=sse
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          clang -O3 -dynamiclib -arch x86_64 -arch arm64 -mmacosx-version-min=11.0 pffft.c -o libpffft.dylib
        else
          # 1. AVX2 Version für Linux
          gcc -O3 -fPIC -mavx2 -c pffft.c -o pffft.o
          # 2. No-AVX2 Version für Linux
          gcc -O3 -fPIC -c pffft.c -o pffft_noAVX2.o
        fi
      shell: bash

    - name: Build Application (Linux & macOS)
      if: matrix.os != 'windows-latest'
      run: |
        rm -rf lib/ backup/ 2>/dev/null || true
        PROJECT_FILE="TaraDSP.lpi"
        
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          export FPCOPT="-WM11.0"
          lazbuild -B --build-mode=Release "$PROJECT_FILE"
          
          # Sicherstellen, dass das Mac-Universal-Binary korrekt geschrieben ist
          [ -f taradsp ] && mv taradsp TaraDSP || true
        else
          # Linux: Erst die AVX2-Version bauen
          lazbuild -B --build-mode=Release "$PROJECT_FILE"
          
          # Die AVX2-Version bleibt OHNE Namenszusatz direkt als TaraDSP bestehen
          BIN_NAME="taradsp"
          [ -f "TaraDSP" ] && BIN_NAME="TaraDSP"
          mv "$BIN_NAME" TaraDSP_temp
          
          # Linux: Dann Cache leeren und die No-AVX2-Version bauen
          rm -rf lib/ backup/ 2>/dev/null || true
          cp pffft_noAVX2.o pffft.o
          lazbuild -B --build-mode=Release-NoAVX2 "$PROJECT_FILE"
          
          # Erzwingt korrekte Groß-Kleinschreibung für die No-AVX2 Variante
          BIN_NOAVX_NAME="taradsp-noAVX2"
          [ -f "TaraDSP-noAVX2" ] && BIN_NOAVX_NAME="TaraDSP-noAVX2"
          mv "$BIN_NOAVX_NAME" TaraDSP-noAVX2
          
          # Temporären Namen für das AVX2-Hauptbinary zurücksetzen
          mv TaraDSP_temp TaraDSP
        fi
      shell: bash
    
    - name: Build Application (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # 1. Offizielle 64-Bit libsoxr.dll live über MSYS2/Pacman herunterladen
        C:\msys64\usr\bin\bash.exe -l -c "pacman -Sy --noconfirm mingw-w64-x86_64-libsoxr"
        
        # 2. Die heruntergeladene DLL direkt in dein Hauptverzeichnis kopieren
        copy "C:\msys64\mingw64\bin\libsoxr.dll" ".\libsoxr.dll" /y
        
        # 3. AVX2 Version bauen
        lazbuild -B --build-mode=Release --compiler-options="-CfAVX2 -CpCOREAVX2" TaraDSP.lpi
        if exist taradsp.exe move taradsp.exe TaraDSP.exe
        
        # 4. No-AVX2 Version bauen
        lazbuild -B --build-mode=Release-NoAVX2 TaraDSP.lpi
        if exist taradsp-noAVX2.exe move taradsp-noAVX2.exe TaraDSP-noAVX2.exe
        
        # 5. Notwendige MinGW-Laufzeit-DLLs für das C-Backend sichern
        mkdir min_dll 2>nul
        copy "C:\msys64\mingw64\bin\libgcc_s_seh-1.dll" ".\min_dll\" /y 2>nul
        copy "C:\msys64\mingw64\bin\libwinpthread-1.dll" ".\min_dll\" /y 2>nul
      shell: cmd

    - name: Run TaraDSP Test Suite (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        ./create_test_data.ps1
        ./tests.ps1
      shell: powershell

    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        # 1. Haupt-Binaries kopieren (Läuft auf allen Plattformen)
        cp TaraDSP.exe dist/ 2>/dev/null || true
        cp TaraDSP dist/ 2>/dev/null || true
        cp TaraDSP-noAVX2* dist/ 2>/dev/null || true
        
        # 2. Windows-DLLs kopieren (NUR auf dem Windows-Runner ausführen!)
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp *.dll dist/ 2>/dev/null || true
          cp min_dll/*.dll dist/ 2>/dev/null || true
        fi
        
        # 3. macOS- und Zusatzdateien sichern
        [ -f libpffft.dylib ] && cp libpffft.dylib dist/ || true
        [ -f settings.ini ] && cp settings.ini dist/ || true
        [ -f LICENSE ] && cp LICENSE dist/ || true
        
        # Aufräumen
        rm -rf min_dll 2>/dev/null || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TaraDSP-${{ runner.os }}
        path: dist/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package and Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          name: TaraDSP Release ${{ github.ref_name }}
          body: "Multi-platform binaries for Windows, Linux, and macOS."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

