name: Multi-Platform Build TaraDSP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Wir bauen für alle drei großen Betriebssysteme
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: 'stable'

    - name: Install Build Essentials (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtk2.0-dev libsoxr-dev libx11-dev
        
        # Erzeugt einen sicheren Symlink für den Pascal-Linker, falls Ubuntu den Pfad versteckt
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libsoxr.so.0 /usr/lib/libsoxr.so

    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libsoxr
        
        # Verlinkt die macOS Homebrew-Bibliothek in das System-Suchverzeichnis
        sudo ln -sf $(brew --prefix libsoxr)/lib/libsoxr.dylib /usr/local/lib/libsoxr.dylib

    - name: Set up MinGW
      if: runner.os == 'Windows'
      uses: egor-tensin/setup-mingw@v3
      with:
        platform: x64
      
    - name: Compile Static C-Backend (PFFFT)
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          gcc -O3 -c pffft.c -o pffft.obj -msse -mfpmath=sse
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          # Erzeugt direkt eine universelle Dynamic Library für Intel UND Apple Silicon
          clang -O3 -dynamiclib -arch x86_64 -arch arm64 -mmacosx-version-min=11.0 pffft.c -o libpffft.dylib
          
          # Prüft das Ergebnis im Log zur Sicherheit
          file libpffft.dylib
        else
          gcc -O3 -fPIC -c pffft.c -o pffft.o
        fi
      shell: bash

    - name: Build Application (Linux & macOS)
      if: matrix.os != 'windows-latest'
      run: |
        # Bereinigt alte Cache-Leichen vor dem Build
        rm -rf lib/ backup/ 2>/dev/null || true
        
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          export FPCOPT="-WM11.0"
        fi
        
        # Zwingt lazbuild mit -B alles absolut frisch zu übersetzen
        lazbuild -B --build-mode=Release TaraDSP.lpi
      shell: bash
    
    - name: Build Application (Windows)
      if: matrix.os == 'windows-latest'
      run: ./build.bat
      shell: cmd

    # === AUTOMATISCHE TESTDATEN-GENERIERUNG + TESTS ===
    - name: Run TaraDSP Test Suite (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # 1. Erstellt den Ordner und die WAV-Dateien live auf dem Server
        ./create_test_data.ps1
        
        # 2. Führt deine eigentliche Test-Suite aus
        ./tests.ps1
      shell: powershell

    - name: Prepare Artifacts
      shell: bash
   
    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        # Kopiere Binaries
        cp TaraDSP.exe dist/ 2>/dev/null || true
        cp TaraDSP dist/ 2>/dev/null || true
        
        # Kopiere die universelle Mac-Dylib mit in den dist-Ordner
        [ -f libpffft.dylib ] && cp libpffft.dylib dist/ || true
        
        # Einstellungen und Lizenz sichern
        [ -f settings.ini ] && cp settings.ini dist/ || true
        [ -f LICENSE ] && cp LICENSE dist/ || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TaraDSP-${{ runner.os }}
        path: dist/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package and Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          name: TaraDSP Release ${{ github.ref_name }}
          body: "Multi-platform binaries for Windows, Linux, and macOS."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
