; ---------------------------------------------------------
; IRConvolverPro Configuration (Shared by CLI and GUI)
; ---------------------------------------------------------

[Metadata]
; This name will be embedded in the 'IART' (Artist) tag of the WAV file
Artist=Your Professional Studio Name
Comment=Mastered with IRConvolverPro v1.2

[Audio]
; Standard bit depth (16 or 24)
TargetBits=24
; Default gain adjustment in dB
DefaultGain=-0.1
; Dither intensity: 1.0 is standard TPDF
DitherAmount=1.0

[Hardware]
; Default truncation length for modelers (e.g., 1024 for GP-200)
; Set to 0 to disable automatic truncation by default
TruncateLen=0

[SRC]
; SRC Profile: gentle (recommended for IRs) or brickwall
FilterProfile=gentle
